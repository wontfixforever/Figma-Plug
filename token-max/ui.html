    // iOS5 helper: normalize mode name for bucket keys (Light/Dark)
    function ios5BucketName(modeName) {
        if (modeName.includes('Light')) return 'Light';
        if (modeName.includes('Dark')) return 'Dark';
        return modeName;
    }

    function extractUniqueSuffix(parentName, childName) {
      const parentWords = new Set(parentName.split(/\s+/));
      return childName.split(/\s+/).filter(w => !parentWords.has(w)).join('');
    }

    function isIdenticalToParent(childVar, parentVar, childCol, parentCol) {
      let sharedModes = 0;
      for (const childMode of childCol.modes) {
        const normalizedChild = ios5BucketName(childMode.name);
        const parentMode = parentCol.modes.find(m => ios5BucketName(m.name) === normalizedChild);
        if (!parentMode) continue;
        sharedModes++;
        const childVal = String(childVar.valuesByMode[childMode.modeId] && childVar.valuesByMode[childMode.modeId].type === 'VARIABLE_ALIAS'
          ? childVar.valuesByMode[childMode.modeId].id
          : childVar.valuesByMode[childMode.modeId]);
        const parentVal = String(parentVar.valuesByMode[parentMode.modeId] && parentVar.valuesByMode[parentMode.modeId].type === 'VARIABLE_ALIAS'
          ? parentVar.valuesByMode[parentMode.modeId].id
          : parentVar.valuesByMode[parentMode.modeId]);
        if (childVal !== parentVal) return false;
      }
      return sharedModes > 0;
    }

    function formatJson(selectedIds, metaData, preset = "Default") {
      const exposeUnderlying = document.getElementById('expose-underlying-toggle').checked;
      const primitivesMode = document.getElementById('primitives-toggle').checked;

      const getExportValue = (val) => {
        if (!val) return null;
        if (val.type === 'VARIABLE_ALIAS') return `{${aliasMap[val.id] || 'unknown'}}`;
        if (typeof val === 'object' && val.r !== undefined) return rgbToHex(val);
        return val;
      };

      // iOS6: shorten alias paths to last 2 segments — {Primitive Colors/RATIO/Neutral/0} → {Neutral/0}
      const shortenAlias = (val, keepSegments = 2) => {
        if (typeof val !== 'string') return val;
        if (!val.startsWith('{') || !val.endsWith('}')) return val;
        const inner = val.slice(1, -1);
        const parts = inner.split('/');
        if (parts.length <= 2) return val;
        const take = Math.min(keepSegments, parts.length - 1);
        return `{${parts.slice(-take).join('/')}}`;
      };

      const globalKnowledge = {};
      collectionsData.forEach(c => {
          const modes = {};
          c.modes.forEach(m => modes[m.modeId] = m.name);
          globalKnowledge[c.name] = modes; 
      });

      // Build active collection parent-child pairs for this export
      const exportingColIds = new Set(
        collectionsData.filter(c => c.variables.some(v => selectedIds.includes(v.id))).map(c => c.id)
      );
      const activeChildPairs = {};
      for (const [childId, parentId] of Object.entries(collectionParents)) {
        if (exportingColIds.has(childId) && exportingColIds.has(parentId)) {
          const parentCol = collectionsData.find(c => c.id === parentId);
          const childCol  = collectionsData.find(c => c.id === childId);
          activeChildPairs[childId] = {
            parentCol,
            uniqueSuffix: extractUniqueSuffix(parentCol.name, childCol.name)
          };
        }
      }

      const results = collectionsData.map(col => {
        const colResult = { 
            [col.name]: { 
                $version: metaData
            } 
        };

        if (preset !== 'iOS2' && preset !== 'iOS3' && preset !== 'iOS4' && preset !== 'iOS5' && preset !== 'iOS6' && preset !== 'iOS7') {
            if (!primitivesMode) colResult[col.name].modes = {};
        } else if (preset === 'iOS3' || preset === 'iOS4' || preset === 'iOS5' || preset === 'iOS6' || preset === 'iOS7') {
            colResult[col.name].$index = {};
        }

        let hasSelected = false;

        // Primitives mode: compute the longest common folder prefix across selected variables
        let primitivesStripDepth = 0;
        if (primitivesMode) {
            const selectedVars = col.variables.filter(v => selectedIds.includes(v.id));
            if (selectedVars.length > 0) {
                const allParts = selectedVars.map(v => v.name.split('/').slice(0, -1));
                if (allParts.length > 0 && allParts[0].length > 0) {
                    let depth = 0;
                    for (let i = 0; i < allParts[0].length; i++) {
                        const seg = allParts[0][i];
                        if (allParts.every(p => p[i] === seg)) depth = i + 1;
                        else break;
                    }
                    primitivesStripDepth = depth;
                }
            }
        }

        col.modes.forEach((mode, idx) => {
          const headerCheck = document.querySelector(`.mode-col-check[data-colid="${col.id}"][data-modeidx="${idx}"]`);
          if (headerCheck && !headerCheck.checked) return;
          
          const modeKey = `${col.id}|${mode.modeId}`;
          const isChild = childModes.has(modeKey);
          let parentId = null;
          let allFamilyIds = []; 

          if (isChild) {
             parentId = parentAssignments[modeKey];
          } else {
             const children = Object.keys(parentAssignments).filter(k => parentAssignments[k] === mode.modeId);
             if (children.length > 0) parentId = mode.modeId; 
          }

          if (parentId) {
             allFamilyIds.push(parentId);
             Object.keys(parentAssignments).forEach(k => {
                 if (parentAssignments[k] === parentId) allFamilyIds.push(k.split('|')[1]);
             });
          }

          // --- iOS3 DOMINANT COLORS ---
          const dominantColors = { Fall: "", Buy: "" };
          if (preset === 'iOS3' || preset === 'iOS4' || preset === 'iOS5' || preset === 'iOS6' || preset === 'iOS7') {
              col.variables.forEach(v => {
                  if (!selectedIds.includes(v.id)) return;
                  
                  const baseName = v.name.split('/').pop().trim();
                  if (baseName.startsWith("On ")) return;

                  const rawVal = v.valuesByMode[mode.modeId];
                  const finalVal = getExportValue(rawVal);
                  let colorName = "";
                  
                  if (finalVal && finalVal.includes('/')) {
                      const valParts = finalVal.replace(/[{}]/g, '').split('/');
                      colorName = valParts.length >= 2 ? valParts[valParts.length - 2] : valParts[0];
                  }
                  
                  if (v.name.includes("Negative")) dominantColors.Fall = colorName;
                  if (v.name.includes("Buy")) dominantColors.Buy = colorName;
              });
          }

          const modeData = {};
          
          col.variables.forEach(v => {
             if (selectedIds.includes(v.id)) {
                // All presets: skip child vars that are identical to their linked parent collection
                if (activeChildPairs[col.id]) {
                  const { parentCol } = activeChildPairs[col.id];
                  const parentVar = parentCol.variables.find(pv => pv.name === v.name);
                  if (parentVar && isIdenticalToParent(v, parentVar, col, parentCol)) return;
                }

                const rawValue = v.valuesByMode[mode.modeId];
                const finalValue = getExportValue(rawValue);

                if (preset === "Default" && isChild && parentId) {
                    const parentRaw = v.valuesByMode[parentId];
                    if (String(finalValue) === String(getExportValue(parentRaw))) return; 
                }

                let iosIndex = null;
                const activePreset = ["iOS", "iOS2", "iOS3", "iOS4", "iOS5", "iOS6", "iOS7"].includes(preset);
                
                if (activePreset && parentId && allFamilyIds.length > 0) {
                    const parentValStr = String(getExportValue(v.valuesByMode[parentId]));
                    const allMatch = allFamilyIds.every(id => String(getExportValue(v.valuesByMode[id])) === parentValStr);
                    let safeModeName = mode.name.split(' ')[0]; // e.g. "Light"
                    let safeParentName = (collectionsData.find(c=>c.id===col.id).modes.find(m=>m.modeId===parentId).name).split(' ')[0]; // e.g. "Light"
                    if (preset === 'iOS5' || preset === 'iOS6' || preset === 'iOS7') {
                        safeModeName = ios5BucketName(mode.name);
                        safeParentName = ios5BucketName(collectionsData.find(c=>c.id===col.id).modes.find(m=>m.modeId===parentId).name);
                    }

                    // iOS5: keyword family membership trumps allMatch — entire families
                    // (Buy, Sell, Positive, Negative incl. "On" tokens) stay together.
                    const keywords = ["Positive", "Negative", "Buy", "Sell"];
                    const hasKeyword = keywords.some(kw => v.name.includes(kw));

                    if ((preset === 'iOS5' || preset === 'iOS6' || preset === 'iOS7') && hasKeyword) {
                        let colorName = "";
                        if (finalValue && finalValue.includes('/')) {
                            const valParts = finalValue.replace(/[{}]/g, '').split('/');
                            colorName = valParts.length >= 2 ? valParts[valParts.length - 2] : valParts[0];
                        }
                        let prefix = "RiseFall";
                        let groupName = "Fall";
                        if (v.name.includes("Positive") || v.name.includes("Negative")) {
                            if (dominantColors.Fall) colorName = dominantColors.Fall;
                        } else if (v.name.includes("Buy") || v.name.includes("Sell")) {
                            prefix = "BuySell";
                            groupName = "Buy";
                            if (dominantColors.Buy) colorName = dominantColors.Buy;
                        }
                        iosIndex = `${prefix}/${groupName}${colorName}/${safeModeName}`;
                    } else if (allMatch) {
                        iosIndex = `Common/${safeParentName}`;
                    } else {
                        let colorName = "";
                        if (finalValue && finalValue.includes('/')) {
                            const valParts = finalValue.replace(/[{}]/g, '').split('/');
                            colorName = valParts.length >= 2 ? valParts[valParts.length - 2] : valParts[0];
                        }

                        let groupName = "";
                        let prefix = "RiseFall";

                        if (preset === 'iOS3' || preset === 'iOS4' || preset === 'iOS5' || preset === 'iOS6' || preset === 'iOS7') {
                            if (v.name.includes("Positive") || v.name.includes("Negative")) {
                                prefix = "RiseFall";
                                groupName = "Fall";
                                if (dominantColors.Fall) colorName = dominantColors.Fall;
                            } else if (v.name.includes("Buy") || v.name.includes("Sell")) {
                                prefix = "BuySell";
                                groupName = "Buy";
                                if (dominantColors.Buy) colorName = dominantColors.Buy;
                            }

                            // If it has a keyword, route it to the specific bucket
                            if (hasKeyword) {
                                iosIndex = `${prefix}/${groupName}${colorName}/${safeModeName}`;
                            } else {
                                // FIX: If it doesn't have a keyword but failed the allMatch check (like Surface),
                                // it's just a Common variable with an override. Leave it in Common.
                                iosIndex = `Common/${safeParentName}`;
                            }

                        } else {
                            for (const kw of keywords) { if (v.name.includes(kw)) { groupName = kw; break; } }
                            if (groupName) {
                                if (preset === 'iOS2') {
                                    if (groupName === 'Sell') { groupName = 'Buy'; colorName = 'Blue'; }
                                    else if (groupName === 'Positive') { groupName = 'Negative'; colorName = 'Red'; }
                                    if (groupName === 'Buy') prefix = 'BuySell';
                                }
                                iosIndex = `${prefix}/${groupName}${colorName}/${safeModeName}`;
                            } else {
                                iosIndex = `Common/${safeParentName}`; // FIX for iOS/iOS2 fallback
                            }
                        }
                    }
                    
                    // Deduplication logic: If a child mode's value is the exact same as the parent's value,
                    // AND it belongs in Common, skip exporting it to prevent duplicates in the JSON.
                    if (isChild) {
                        if (preset === 'iOS3' || preset === 'iOS4' || preset === 'iOS5' || preset === 'iOS6' || preset === 'iOS7') {
                            if (String(finalValue) === parentValStr && iosIndex && iosIndex.startsWith("Common/")) return;
                        }
                        else {
                            if (iosIndex && iosIndex.startsWith("Common/")) return;
                        }
                    }
                }

                // --- iOS4/iOS5 FALLBACK: name-based bucketing when no parent/child configured ---
                if ((preset === 'iOS4' || preset === 'iOS5' || preset === 'iOS6' || preset === 'iOS7') && !iosIndex) {
                    const safeModeName = (preset === 'iOS5' || preset === 'iOS6' || preset === 'iOS7') ? ios5BucketName(mode.name) : mode.name;
                    const leafName = v.name.split('/').pop().trim();
                    // iOS4: Plain "On *" tokens (On Buy, On Negative, etc.) route to Common.
                    // iOS5: All keyword tokens route to their keyword bucket regardless of "On " prefix.
                    const isPlainOnToken = preset !== 'iOS5' && preset !== 'iOS6' && preset !== 'iOS7' && leafName.startsWith('On ') && !leafName.endsWith(' Subtle');
                    let colorName = '';
                    if (finalValue && finalValue.includes('/')) {
                        const valParts = finalValue.replace(/[{}]/g, '').split('/');
                        colorName = valParts.length >= 2 ? valParts[valParts.length - 2] : valParts[0];
                    }
                    // iOS5: Positive+Negative → RiseFall, Buy+Sell → BuySell (matches parent-child path)
                    // iOS4: Negative+Sell → RiseFall, Positive+Buy → BuySell (legacy)
                    if ((preset === 'iOS5' || preset === 'iOS6' || preset === 'iOS7') && !isPlainOnToken && (v.name.includes('Positive') || v.name.includes('Negative'))) {
                        if (dominantColors.Fall) colorName = dominantColors.Fall;
                        iosIndex = `RiseFall/Fall${colorName}/${safeModeName}`;
                    } else if ((preset === 'iOS5' || preset === 'iOS6' || preset === 'iOS7') && !isPlainOnToken && (v.name.includes('Buy') || v.name.includes('Sell'))) {
                        if (dominantColors.Buy) colorName = dominantColors.Buy;
                        iosIndex = `BuySell/Buy${colorName}/${safeModeName}`;
                    } else if (preset !== 'iOS5' && preset !== 'iOS6' && preset !== 'iOS7' && !isPlainOnToken && (v.name.includes('Negative') || v.name.includes('Sell'))) {
                        if (dominantColors.Fall) colorName = dominantColors.Fall;
                        iosIndex = `RiseFall/Fall${colorName}/${safeModeName}`;
                    } else if (preset !== 'iOS5' && preset !== 'iOS6' && preset !== 'iOS7' && !isPlainOnToken && (v.name.includes('Positive') || v.name.includes('Buy'))) {
                        if (dominantColors.Buy) colorName = dominantColors.Buy;
                        iosIndex = `BuySell/Buy${colorName}/${safeModeName}`;
                    } else {
                        iosIndex = `Common/${safeModeName}`;
                    }
                }

                // iOS7: inject unique child suffix into bucket key second segment
                if (preset === 'iOS7' && activeChildPairs[col.id] && iosIndex && !iosIndex.startsWith('Common/')) {
                  const iosParts = iosIndex.split('/');
                  if (iosParts.length >= 2) {
                    iosParts[1] = iosParts[1] + activeChildPairs[col.id].uniqueSuffix;
                    iosIndex = iosParts.join('/');
                  }
                }

                hasSelected = true;
                let targetStorage;

                if ((preset === 'iOS2' || preset === 'iOS3' || preset === 'iOS4' || preset === 'iOS5' || preset === 'iOS6' || preset === 'iOS7') && iosIndex) {
                    const root = (preset === 'iOS3' || preset === 'iOS4' || preset === 'iOS5' || preset === 'iOS6' || preset === 'iOS7') ? colResult[col.name].$index : colResult[col.name];
                    if (!root[iosIndex]) root[iosIndex] = {};
                    targetStorage = root[iosIndex];
                } else {
                    targetStorage = modeData;
                }

                const parts = v.name.split('/');
                const varName = parts.pop().trim();

                // Primitives mode: strip common prefix folders (e.g. RATIO/ or White Label/SNB/)
                if (primitivesMode && primitivesStripDepth > 0) {
                    parts.splice(0, primitivesStripDepth);
                }

                // TRACK VARIABLE ID FOR RENAMING
                const varObj = {
                    "$id": v.id, 
                    "$type": v.type.toLowerCase(),
                    "$libraryName": currentFileName,
                    "$collectionName": col.name,
                    "$value": (preset === 'iOS6' || preset === 'iOS7') ? shortenAlias(finalValue, activeChildPairs[col.id] ? 3 : 2) : finalValue
                };

                if (exposeUnderlying && rawValue && rawValue.type === 'VARIABLE_ALIAS') {
                    if (v.type === 'COLOR') {
                        const colorObj = v.resolvedValuesByMode ? v.resolvedValuesByMode[mode.modeId] : null;
                        if (colorObj) varObj["$underlyingValue"] = rgbToHex(colorObj);
                    } else if (v.type === 'FLOAT') {
                        const numVal = v.resolvedValuesByMode ? v.resolvedValuesByMode[mode.modeId] : null;
                        if (numVal !== null && numVal !== undefined) varObj["$underlyingValue"] = numVal;
                    }
                }

                if (preset === 'iOS3' || preset === 'iOS4' || preset === 'iOS5' || preset === 'iOS6' || preset === 'iOS7') varObj["$mode"] = mode.name;
                if (preset !== 'iOS2' && preset !== 'iOS3' && preset !== 'iOS4' && preset !== 'iOS5' && preset !== 'iOS6' && preset !== 'iOS7' && iosIndex) varObj["$index"] = iosIndex;

                let current = targetStorage;
                if (parts.length > 0) {
                    const rootGroup = parts[0].trim();
                    const fullGroupPath = parts.map(p => p.trim()).join('/');
                    if (primitivesMode) {
                        if (!current[fullGroupPath]) current[fullGroupPath] = {};
                        current[fullGroupPath][varName] = varObj;
                    } else {
                        if (!current[rootGroup]) current[rootGroup] = {};
                        if (fullGroupPath === rootGroup) current[rootGroup][varName] = varObj;
                        else {
                            if (!current[rootGroup][fullGroupPath]) current[rootGroup][fullGroupPath] = {};
                            current[rootGroup][fullGroupPath][varName] = varObj;
                        }
                    }
                } else {
                    current[varName] = varObj;
                }
             }
          });
          
          if (preset !== 'iOS2' && preset !== 'iOS3' && Object.keys(modeData).length > 0) {
              if (primitivesMode) {
                  if (!colResult[col.name].Primitives) colResult[col.name].Primitives = {};
                  Object.assign(colResult[col.name].Primitives, modeData);
              } else {
                  colResult[col.name].modes[mode.name] = modeData;
              }
          }
        });
        
        return hasSelected ? colResult : null;
      }).filter(n => n !== null);

      // Merge child collection $index buckets into parent's $index and remove child entry
      for (const [childId] of Object.entries(activeChildPairs)) {
        const childColName = collectionsData.find(c => c.id === childId)?.name;
        const parentColName = activeChildPairs[childId].parentCol.name;
        const parentIdx = results.findIndex(r => r[parentColName]);
        const childIdx  = results.findIndex(r => r[childColName]);
        if (parentIdx === -1 || childIdx === -1) continue;
        const parentIndex = results[parentIdx][parentColName].$index;
        const childIndex  = results[childIdx][childColName].$index;
        if (parentIndex && childIndex) {
          for (const [bucket, vars] of Object.entries(childIndex)) {
            if (bucket.startsWith('Common/')) continue;
            if (!parentIndex[bucket]) parentIndex[bucket] = {};
            Object.assign(parentIndex[bucket], vars);
          }
        }
        results.splice(childIdx, 1);
      }

      results.push({ $knownCollections: globalKnowledge });
      return results;
    }
    lucide.createIcons();
  </script>
